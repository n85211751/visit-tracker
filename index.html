<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>拜訪習慣系統｜管理員版</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root {
  --bg:#0D0D0D; --bg2:#141414; --bg3:#1C1C1C;
  --gold:#C9A84C; --gold-light:#E2C06A; --gold-dim:rgba(201,168,76,0.13); --gold-border:rgba(201,168,76,0.25);
  --text:#F0EAD6; --text-dim:#8A8070;
  --red:#E05555; --green:#5DBB8A; --blue:#5A9FD4; --purple:#9B7FD4;
}
body { background:var(--bg); color:var(--text); font-family:-apple-system,'PingFang TC',sans-serif; min-height:100vh; padding-bottom:90px; max-width:480px; margin:0 auto; }

/* ── LOGIN ── */
#loginScreen {
  position:fixed; inset:0; background:var(--bg); z-index:999;
  display:flex; flex-direction:column; align-items:center; justify-content:center; padding:32px;
}
.login-logo { font-size:40px; margin-bottom:12px; }
.login-title { font-size:20px; font-weight:700; color:var(--gold); margin-bottom:4px; }
.login-sub { font-size:12px; color:var(--text-dim); margin-bottom:32px; }
.login-box { width:100%; max-width:340px; }
.login-field { margin-bottom:14px; }
.login-label { font-size:11px; color:var(--text-dim); letter-spacing:1px; margin-bottom:6px; }
.login-input { width:100%; background:var(--bg3); border:1px solid rgba(255,255,255,0.1); border-radius:12px; padding:14px 16px; color:var(--text); font-size:15px; outline:none; }
.login-input:focus { border-color:var(--gold); }
.login-btn { width:100%; padding:15px; border-radius:12px; background:linear-gradient(135deg,var(--gold),var(--gold-light)); border:none; color:#0D0D0D; font-size:16px; font-weight:700; cursor:pointer; margin-top:6px; }
.login-err { color:var(--red); font-size:13px; text-align:center; margin-top:10px; min-height:20px; }

/* ── TOPBAR ── */
.topbar { position:sticky; top:0; z-index:100; background:var(--bg); border-bottom:1px solid var(--gold-border); padding:12px 16px 10px; }
.topbar-row { display:flex; justify-content:space-between; align-items:center; }
.app-title { font-size:13px; color:var(--gold); letter-spacing:2px; font-weight:600; }
.user-pill { display:flex; align-items:center; gap:8px; }
.user-badge { font-size:11px; background:var(--gold-dim); border:1px solid var(--gold-border); color:var(--gold); padding:4px 10px; border-radius:20px; cursor:pointer; }
.admin-badge { font-size:10px; background:rgba(93,187,138,0.12); border:1px solid rgba(93,187,138,0.3); color:var(--green); padding:3px 8px; border-radius:10px; }
.logout-btn { font-size:11px; color:var(--text-dim); border:none; background:none; cursor:pointer; padding:4px; }

/* ── MEMBER SWITCHER ── */
#memberBar {
  background:var(--bg2); border-bottom:1px solid var(--gold-border);
  padding:10px 16px; overflow-x:auto; white-space:nowrap;
  display:none; gap:8px; scrollbar-width:none;
}
#memberBar::-webkit-scrollbar { display:none; }
.member-chip {
  display:inline-flex; align-items:center; gap:6px;
  background:var(--bg3); border:1px solid rgba(255,255,255,0.08);
  border-radius:20px; padding:6px 12px; font-size:12px; color:var(--text-dim);
  cursor:pointer; transition:all 0.2s; white-space:nowrap;
}
.member-chip.active { background:var(--gold-dim); border-color:var(--gold-border); color:var(--gold); }
.member-chip .dot { width:7px; height:7px; border-radius:50%; background:var(--text-dim); }
.member-chip.active .dot { background:var(--gold); }

/* ── VIEWING BANNER ── */
#viewingBanner {
  display:none; background:rgba(90,159,212,0.1); border-bottom:1px solid rgba(90,159,212,0.2);
  padding:8px 16px; font-size:12px; color:var(--blue);
  display:none; align-items:center; justify-content:space-between;
}
#viewingBanner.show { display:flex; }

/* ── GOAL BANNER ── */
.goal-banner { background:var(--gold-dim); border:1px solid var(--gold-border); border-radius:12px; margin:12px 16px; padding:14px 16px; }
.goal-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
.goal-label { font-size:12px; color:var(--gold); letter-spacing:1px; }
.goal-edit-btn { font-size:11px; color:var(--gold); border:1px solid var(--gold-border); border-radius:6px; padding:3px 8px; background:none; cursor:pointer; }
.goal-progress-row { display:flex; align-items:center; gap:12px; }
.goal-nums { font-size:28px; font-weight:700; color:var(--gold-light); line-height:1; }
.goal-nums span { font-size:14px; color:var(--text-dim); font-weight:400; }
.goal-bar-wrap { flex:1; }
.goal-bar-bg { height:6px; background:rgba(255,255,255,0.08); border-radius:3px; overflow:hidden; }
.goal-bar-fill { height:100%; background:linear-gradient(90deg,var(--gold),var(--gold-light)); border-radius:3px; transition:width 0.4s; }
.goal-msg { font-size:12px; color:var(--text-dim); margin-top:8px; }

/* ── TABS ── */
.tabs { position:fixed; bottom:0; left:50%; transform:translateX(-50%); width:100%; max-width:480px; background:var(--bg2); border-top:1px solid var(--gold-border); display:flex; z-index:100; padding-bottom:env(safe-area-inset-bottom); }
.tab-btn { flex:1; padding:10px 2px 8px; background:none; border:none; color:var(--text-dim); font-size:9px; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:4px; transition:color 0.2s; }
.tab-btn.active { color:var(--gold); }
.tab-icon { font-size:18px; line-height:1; }

/* ── PAGES ── */
.page { display:none; padding:0 16px; }
.page.active { display:block; }

/* ── COMMON ── */
.sec-header { display:flex; justify-content:space-between; align-items:center; margin:16px 0 10px; }
.sec-title { font-size:13px; color:var(--gold); letter-spacing:1px; font-weight:600; }
.add-btn { background:var(--gold-dim); border:1px solid var(--gold-border); color:var(--gold); font-size:12px; border-radius:8px; padding:6px 12px; cursor:pointer; }

.card { background:var(--bg3); border:1px solid rgba(255,255,255,0.06); border-radius:12px; padding:14px; margin-bottom:10px; }
.card-name { font-size:15px; font-weight:600; margin-bottom:4px; }
.card-sub { font-size:12px; color:var(--text-dim); line-height:1.6; }
.card-tag { display:inline-block; font-size:10px; padding:2px 8px; border-radius:10px; margin-top:8px; margin-right:4px; }
.tag-hot { background:rgba(224,85,85,0.15); color:var(--red); border:1px solid rgba(224,85,85,0.3); }
.tag-warm { background:rgba(201,168,76,0.15); color:var(--gold); border:1px solid rgba(201,168,76,0.3); }
.tag-cold { background:rgba(90,159,212,0.15); color:var(--blue); border:1px solid rgba(90,159,212,0.3); }
.tag-new { background:rgba(93,187,138,0.15); color:var(--green); border:1px solid rgba(93,187,138,0.3); }
.card-actions { display:flex; gap:8px; margin-top:10px; }
.card-btn { flex:1; font-size:11px; padding:7px; border-radius:8px; border:1px solid var(--gold-border); background:none; color:var(--gold); cursor:pointer; text-align:center; }
.card-btn.danger { border-color:rgba(224,85,85,0.3); color:var(--red); }

.visit-card { background:var(--bg3); border-radius:12px; padding:14px; margin-bottom:10px; border-left:3px solid var(--gold); }
.visit-date { font-size:11px; color:var(--text-dim); margin-bottom:6px; }
.visit-who { font-size:15px; font-weight:600; margin-bottom:8px; }
.visit-row { display:flex; gap:8px; margin-bottom:6px; }
.visit-label { font-size:11px; color:var(--gold); min-width:52px; margin-top:1px; }
.visit-val { font-size:13px; color:var(--text-dim); line-height:1.5; flex:1; }

.review-block { background:var(--bg3); border-radius:12px; padding:16px; margin-bottom:12px; }
.review-block-title { font-size:12px; color:var(--gold); letter-spacing:1px; margin-bottom:10px; }
.review-stat-row { display:flex; gap:10px; margin-bottom:12px; }
.review-stat { flex:1; background:var(--bg3); border-radius:10px; padding:12px; text-align:center; }
.review-stat-num { font-size:24px; font-weight:700; color:var(--gold-light); }
.review-stat-label { font-size:10px; color:var(--text-dim); margin-top:3px; }

.result-card { background:var(--bg3); border-radius:12px; padding:14px; margin-bottom:10px; border-left:3px solid var(--green); }
.result-amount { font-size:20px; font-weight:700; color:var(--green); margin-bottom:4px; }
.result-meta { font-size:12px; color:var(--text-dim); }

.quote-card { background:var(--gold-dim); border:1px solid var(--gold-border); border-radius:14px; padding:20px; margin-bottom:14px; text-align:center; }
.quote-text { font-size:16px; font-weight:600; color:var(--gold-light); line-height:1.7; }
.quote-source { font-size:11px; color:var(--text-dim); margin-top:10px; }
.rejection-card { background:rgba(155,127,212,0.08); border:1px solid rgba(155,127,212,0.2); border-radius:12px; padding:16px; margin-bottom:10px; }
.rejection-title { font-size:12px; color:var(--purple); letter-spacing:1px; margin-bottom:8px; }
.rejection-text { font-size:14px; color:var(--text); line-height:1.7; }

.today-plan-card { background:var(--bg3); border-radius:12px; padding:14px; margin-bottom:10px; }
.plan-item { display:flex; align-items:flex-start; gap:10px; padding:10px 0; border-bottom:1px solid rgba(255,255,255,0.05); }
.plan-item:last-child { border-bottom:none; }
.plan-check { width:18px; height:18px; border-radius:50%; border:1.5px solid var(--gold-border); background:none; cursor:pointer; flex-shrink:0; margin-top:2px; display:flex; align-items:center; justify-content:center; transition:all 0.2s; }
.plan-check.done { background:var(--gold); border-color:var(--gold); }
.plan-check.done::after { content:'✓'; font-size:10px; color:#000; font-weight:700; }
.plan-info { flex:1; }
.plan-name { font-size:14px; font-weight:600; }
.plan-script { font-size:12px; color:var(--text-dim); margin-top:3px; line-height:1.5; }

/* ── ADMIN PAGE ── */
.admin-member-card { background:var(--bg3); border-radius:12px; padding:16px; margin-bottom:12px; }
.admin-member-name { font-size:16px; font-weight:700; margin-bottom:4px; }
.admin-member-stats { display:flex; gap:10px; margin:10px 0; }
.admin-stat { flex:1; background:var(--bg); border-radius:8px; padding:10px; text-align:center; }
.admin-stat-num { font-size:20px; font-weight:700; color:var(--gold-light); }
.admin-stat-label { font-size:10px; color:var(--text-dim); margin-top:2px; }

/* ── MODAL ── */
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:200; align-items:flex-end; justify-content:center; }
.modal-overlay.open { display:flex; }
.modal { background:var(--bg2); border-radius:20px 20px 0 0; border-top:1px solid var(--gold-border); width:100%; max-width:480px; padding:20px 20px 44px; max-height:85vh; overflow-y:auto; }
.modal-title { font-size:16px; font-weight:700; color:var(--gold); margin-bottom:16px; }
.field-label { font-size:11px; color:var(--text-dim); margin-bottom:5px; letter-spacing:1px; }
.field-group { margin-bottom:14px; }
input,textarea,select { width:100%; background:var(--bg3); border:1px solid rgba(255,255,255,0.1); border-radius:10px; padding:11px 13px; color:var(--text); font-size:14px; font-family:inherit; outline:none; transition:border-color 0.2s; }
input:focus,textarea:focus,select:focus { border-color:var(--gold); }
textarea { resize:none; line-height:1.6; }
select option { background:var(--bg3); }
.modal-btns { display:flex; gap:10px; margin-top:16px; }
.btn-cancel { flex:1; padding:13px; border-radius:10px; border:1px solid rgba(255,255,255,0.1); background:none; color:var(--text-dim); font-size:14px; cursor:pointer; }
.btn-save { flex:2; padding:13px; border-radius:10px; background:linear-gradient(135deg,var(--gold),var(--gold-light)); border:none; color:#0D0D0D; font-size:14px; font-weight:700; cursor:pointer; }

.empty-state { text-align:center; padding:40px 20px; color:var(--text-dim); }
.empty-icon { font-size:36px; margin-bottom:10px; }
.empty-text { font-size:14px; line-height:1.7; }

.sync-dot { width:7px; height:7px; border-radius:50%; background:var(--text-dim); display:inline-block; margin-right:5px; }
.sync-dot.synced { background:var(--green); }
.sync-dot.error { background:var(--red); }
.sync-status { font-size:11px; color:var(--text-dim); display:flex; align-items:center; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-logo">🤝</div>
  <div class="login-title">拜訪習慣系統</div>
  <div class="login-sub">管理員版｜請登入</div>
  <div class="login-box">
    <div class="login-field">
      <div class="login-label">帳號</div>
      <input class="login-input" id="loginUser" placeholder="輸入帳號" autocomplete="username">
    </div>
    <div class="login-field">
      <div class="login-label">密碼</div>
      <input class="login-input" id="loginPass" type="password" placeholder="輸入密碼" autocomplete="current-password">
    </div>
    <button class="login-btn" onclick="doLogin()">登入</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-row">
    <div class="app-title">拜訪習慣系統</div>
    <div class="user-pill">
      <div class="sync-status"><span class="sync-dot" id="syncDot"></span><span id="syncLabel">連線中</span></div>
      <span class="admin-badge" id="roleBadge" style="display:none">管理員</span>
      <button class="logout-btn" onclick="doLogout()">登出</button>
    </div>
  </div>
  <div style="font-size:11px;color:var(--text-dim);margin-top:4px;" id="viewingAs"></div>
</div>

<!-- MEMBER SWITCHER (admin only) -->
<div id="memberBar"></div>

<!-- VIEWING BANNER -->
<div id="viewingBanner"></div>

<!-- GOAL BANNER -->
<div class="goal-banner">
  <div class="goal-top">
    <div class="goal-label">今日拜訪目標</div>
    <button class="goal-edit-btn" onclick="openGoalModal()">設定目標</button>
  </div>
  <div class="goal-progress-row">
    <div class="goal-nums" id="goalNums">0 <span>/ <span id="goalTarget">5</span> 人</span></div>
    <div class="goal-bar-wrap"><div class="goal-bar-bg"><div class="goal-bar-fill" id="goalBar" style="width:0%"></div></div></div>
  </div>
  <div class="goal-msg" id="goalMsg">今天還沒有拜訪記錄，出發吧！</div>
</div>

<!-- PAGES -->
<div class="page active" id="page-clients">
  <div class="sec-header"><div class="sec-title">客戶名單</div><button class="add-btn" id="addClientBtn" onclick="openModal('client')">＋ 新增</button></div>
  <div id="clientList"></div>
</div>

<div class="page" id="page-brain">
  <div class="sec-header"><div class="sec-title">腦海名單</div><button class="add-btn" id="addBrainBtn" onclick="openModal('brain')">＋ 新增</button></div>
  <div id="brainList"></div>
</div>

<div class="page" id="page-visits">
  <div class="sec-header"><div class="sec-title">拜訪記錄</div><button class="add-btn" id="addVisitBtn" onclick="openModal('visit')">＋ 記錄</button></div>
  <div id="visitList"></div>
</div>

<div class="page" id="page-review">
  <div class="sec-header"><div class="sec-title">每週復盤</div><button class="add-btn" id="addReviewBtn" onclick="openModal('review')">＋ 新增</button></div>
  <div id="reviewStats" class="review-stat-row"></div>
  <div id="reviewList"></div>
</div>

<div class="page" id="page-results">
  <div class="sec-header"><div class="sec-title">成果記錄</div><button class="add-btn" id="addResultBtn" onclick="openModal('result')">＋ 簽單</button></div>
  <div id="resultSummary"></div>
  <div id="resultList"></div>
</div>

<div class="page" id="page-mindset">
  <div class="sec-header"><div class="sec-title">預備心</div></div>
  <div class="quote-card"><div class="quote-text" id="quoteText">正在載入今日金句...</div><div class="quote-source" id="quoteSource"></div></div>
  <button class="add-btn" style="margin-bottom:14px;width:100%;text-align:center;" onclick="openModal('quote')">＋ 新增金句</button>
  <div class="sec-header"><div class="sec-title">今日拜訪計畫</div><button class="add-btn" onclick="openModal('plan')">＋ 新增</button></div>
  <div class="today-plan-card" id="todayPlanList"></div>
  <div class="sec-header"><div class="sec-title">被拒後振作的話</div><button class="add-btn" onclick="openModal('rejection')">＋ 新增</button></div>
  <div id="rejectionList"></div>
</div>

<!-- ADMIN PAGE -->
<div class="page" id="page-admin">
  <div class="sec-header"><div class="sec-title">夥伴管理</div><button class="add-btn" onclick="openModal('addMember')">＋ 新增夥伴</button></div>
  <div id="adminMemberList"></div>
</div>

<!-- TABS -->
<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('clients',this)"><div class="tab-icon">👤</div>客戶</button>
  <button class="tab-btn" onclick="switchTab('brain',this)"><div class="tab-icon">💡</div>腦海</button>
  <button class="tab-btn" onclick="switchTab('visits',this)"><div class="tab-icon">🤝</div>拜訪</button>
  <button class="tab-btn" onclick="switchTab('review',this)"><div class="tab-icon">📊</div>復盤</button>
  <button class="tab-btn" onclick="switchTab('results',this)"><div class="tab-icon">🏆</div>成果</button>
  <button class="tab-btn" onclick="switchTab('mindset',this)"><div class="tab-icon">🙏</div>預備心</button>
  <button class="tab-btn" id="adminTab" style="display:none" onclick="switchTab('admin',this)"><div class="tab-icon">⚙️</div>管理</button>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalContent"></div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc, query, orderBy, setDoc, getDoc, where } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

// ── FIREBASE CONFIG ── 請填入你的設定
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_PROJECT.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};

// ── ADMIN ACCOUNT ── 請修改你的帳號密碼
const ADMIN_ACCOUNT = { username: "吳金津", password: "620127" };

let db, useLocal = false;
const LOCAL = {};
const LOCAL_KEYS = ['clients','brain','visits','reviews','results','quotes','plans','rejections','members'];
LOCAL_KEYS.forEach(k => LOCAL[k] = JSON.parse(localStorage.getItem('vt_'+k)||'[]'));
LOCAL.settings = JSON.parse(localStorage.getItem('vt_settings')||'{}');
const saveLocal = (k) => localStorage.setItem('vt_'+k, JSON.stringify(LOCAL[k]));

function setSyncStatus(s) {
  const dot = document.getElementById('syncDot'), label = document.getElementById('syncLabel');
  if (s==='ok') { dot.className='sync-dot synced'; label.textContent='已同步'; }
  else if (s==='error') { dot.className='sync-dot error'; label.textContent='本地模式'; }
  else { dot.className='sync-dot'; label.textContent='連線中'; }
}

try {
  if (firebaseConfig.apiKey !== 'YOUR_API_KEY') {
    const app = initializeApp(firebaseConfig);
    db = getFirestore(app);
    setSyncStatus('ok');
  } else throw new Error('no config');
} catch(e) { useLocal=true; setSyncStatus('error'); }

// ── SESSION ──
let currentUser = null; // { username, isAdmin }
let viewingUid = null;  // whose data we're viewing (null = self)

// ── DATA LAYER ──
function uidPath(uid) { return uid || (currentUser?.username) || 'default'; }

async function addItem(col, data, uid) {
  data.createdAt = new Date().toISOString();
  const u = uidPath(uid);
  if (useLocal) {
    data.id = Date.now().toString();
    if (!LOCAL[col]) LOCAL[col] = [];
    // filter by uid prefix
    data._uid = u;
    LOCAL[col].unshift(data);
    saveLocal(col);
    return data.id;
  }
  const ref = await addDoc(collection(db, 'users', u, col), data);
  return ref.id;
}

async function getItems(col, uid) {
  const u = uidPath(uid);
  if (useLocal) return (LOCAL[col]||[]).filter(i => (i._uid||'default') === u);
  try {
    const snap = await getDocs(query(collection(db, 'users', u, col), orderBy('createdAt','desc')));
    return snap.docs.map(d => ({ id:d.id, ...d.data() }));
  } catch(e) { return []; }
}

async function deleteItem(col, id, uid) {
  const u = uidPath(uid);
  if (useLocal) { LOCAL[col] = LOCAL[col].filter(i => i.id!==id); saveLocal(col); return; }
  await deleteDoc(doc(db, 'users', u, col, id));
}

async function updateItem(col, id, data, uid) {
  const u = uidPath(uid);
  if (useLocal) {
    const idx = LOCAL[col].findIndex(i=>i.id===id);
    if (idx!==-1) { LOCAL[col][idx]={...LOCAL[col][idx],...data}; saveLocal(col); }
    return;
  }
  await updateDoc(doc(db, 'users', u, col, id), data);
}

async function getSetting(key, uid) {
  const u = uidPath(uid);
  if (useLocal) { const v = LOCAL.settings[u+'_'+key]; return v !== undefined ? v : LOCAL.settings[key]; }
  try { const d = await getDoc(doc(db,'settings',u)); return d.exists()?d.data()[key]:null; } catch(e){ return null; }
}

async function setSetting(key, val, uid) {
  const u = uidPath(uid);
  if (useLocal) { LOCAL.settings[u+'_'+key]=val; LOCAL.settings[key]=val; saveLocal('settings'); return; }
  await setDoc(doc(db,'settings',u), {[key]:val}, {merge:true});
}

// Members stored globally (admin only)
async function getMembers() {
  if (useLocal) return LOCAL.members||[];
  try {
    const snap = await getDocs(collection(db,'members'));
    return snap.docs.map(d=>({id:d.id,...d.data()}));
  } catch(e){ return []; }
}
async function addMember(data) {
  if (useLocal) { data.id=Date.now().toString(); LOCAL.members.unshift(data); saveLocal('members'); return; }
  await addDoc(collection(db,'members'), data);
}
async function deleteMember(id) {
  if (useLocal) { LOCAL.members=LOCAL.members.filter(m=>m.id!==id); saveLocal('members'); return; }
  await deleteDoc(doc(db,'members',id));
}

// ── LOGIN ──
window.doLogin = async function() {
  const user = document.getElementById('loginUser').value.trim();
  const pass = document.getElementById('loginPass').value.trim();
  const err = document.getElementById('loginErr');
  err.textContent = '';

  // Check admin
  if (user === ADMIN_ACCOUNT.username && pass === ADMIN_ACCOUNT.password) {
    currentUser = { username: user, isAdmin: true };
    startApp();
    return;
  }

  // Check members
  const members = await getMembers();
  const found = members.find(m => m.username === user && m.password === pass);
  if (found) {
    currentUser = { username: user, isAdmin: false, displayName: found.displayName };
    startApp();
    return;
  }

  err.textContent = '帳號或密碼錯誤，請再試一次';
};

document.getElementById('loginPass').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });

window.doLogout = function() {
  currentUser = null; viewingUid = null;
  document.getElementById('loginScreen').style.display = 'flex';
};

function startApp() {
  document.getElementById('loginScreen').style.display = 'none';
  viewingUid = null;

  // Show admin UI
  if (currentUser.isAdmin) {
    document.getElementById('roleBadge').style.display = 'inline';
    document.getElementById('adminTab').style.display = 'flex';
    document.getElementById('memberBar').style.display = 'flex';
    loadMemberBar();
  }

  loadAll();
}

async function loadMemberBar() {
  const members = await getMembers();
  const bar = document.getElementById('memberBar');
  let html = `<div class="member-chip active" id="chip_self" onclick="switchViewing(null)"><span class="dot"></span>我自己</div>`;

    html += `<div class="member-chip" id="chip_${m.id}" onclick="switchViewing('${m.username}','${m.displayName||m.username}','${m.id}')">`+

window.switchViewing = async function(uid, name, chipId) {
  viewingUid = uid;
  document.querySelectorAll('.member-chip').forEach(c=>c.classList.remove('active'));
  const chip = uid ? document.getElementById('chip_'+chipId) : document.getElementById('chip_self');
  if (chip) chip.classList.add('active');

  const banner = document.getElementById('viewingBanner');
  const addBtns = document.querySelectorAll('[id^="add"]');
  if (uid) {
    banner.className = 'show'; banner.style.display='flex';

async function renderGoal() {

  document.getElementById('goalTarget').textContent = goal;
  const n = (window._state.visits||[]).filter(v=>v.date===todayISO).length;

function thermometer(pct, label, val, target, unit='') {
  const p = Math.min(100, Math.round(pct));
  const color = p>=100?'var(--green)':p>=60?'var(--gold)':'var(--blue)';
  const h = Math.round(p * 1.2); // max height 120px
  return `<div style="display:flex;flex-direction:column;align-items:center;flex:1;">
    <div style="font-size:11px;color:var(--text-dim);margin-bottom:8px;">${label}</div>
    <div style="position:relative;width:28px;height:120px;background:rgba(255,255,255,0.06);border-radius:14px;overflow:hidden;margin-bottom:6px;">
      <div style="position:absolute;bottom:0;width:100%;height:${h}px;background:${color};border-radius:14px;transition:height 0.6s ease;"></div>
    </div>
    <div style="font-size:18px;font-weight:700;color:${color};">${val}</div>
    <div style="font-size:10px;color:var(--text-dim);">/ ${target}${unit}</div>
    <div style="font-size:9px;color:${color};margin-top:2px;">${p}%</div>
  </div>`;
}

function renderResults() {
  const visits = window._state.visits||[];
  const results = window._state.results||[];
  const now = new Date();
  const todayStr = now.toISOString().split('T')[0];
  const weekAgo = new Date(now-7*86400000);
  const monthStart = new Date(now.getFullYear(), now.getMonth(), 1).toISOString().split('T')[0];
  const yearStart = new Date(now.getFullYear(), 0, 1).toISOString().split('T')[0];

  const vDay = visits.filter(v=>v.date===todayStr).length;
  const vWeek = visits.filter(v=>v.date>=weekAgo.toISOString().split('T')[0]).length;
  const vMonth = visits.filter(v=>v.date>=monthStart).length;
  const vYear = visits.filter(v=>v.date>=yearStart).length;

  const dGoal = parseInt(LOCAL.settings['dailyGoal']||5);
  const wGoal = dGoal*5, mGoal = dGoal*22, yGoal = dGoal*240;

  const total = results.reduce((s,r)=>s+(parseFloat(r.premium)||0),0);
  const rMonth = results.filter(r=>r.date>=monthStart).length;

  document.getElementById('resultSummary').innerHTML=`

      <div style="display:flex;gap:8px;justify-content:space-around;">
        ${thermometer(vDay/dGoal*100,'今日',vDay,dGoal,'人')}
        ${thermometer(vWeek/wGoal*100,'本週',vWeek,wGoal,'人')}
        ${thermometer(vMonth/mGoal*100,'本月',vMonth,mGoal,'人')}
        ${thermometer(vYear/yGoal*100,'本年',vYear,yGoal,'人')}
      </div>
    </div>
    <div class="review-block" style="margin-bottom:12px">

        <div class="admin-stat" style="flex:1"><div class="admin-stat-num">${results.length}</div><div class="admin-stat-label">累計簽單</div></div>

      <div class="admin-member-stats">
        <div class="admin-stat"><div class="admin-stat-num">${visits7}</div><div class="admin-stat-label">本週拜訪</div></div>
        <div class="admin-stat"><div class="admin-stat-num">${results.length}</div><div class="admin-stat-label">累計簽單</div></div>
        <div class="admin-stat"><div class="admin-stat-num" style="font-size:14px">$${(total/10000).toFixed(1)}萬</div><div class="admin-stat-label">業績</div></div>
      </div>
      <button class="card-btn" style="width:100%" onclick="switchViewing('${m.username}','${m.displayName||m.username}','${m.id}');switchTab('clients',document.querySelector('.tab-btn'))">查看完整資料</button>
    </div>`;
  }));
  el.innerHTML = cards.join('');
}

window.confirmDeleteMember = async function(id) {
  if (!confirm('確定移除這位夥伴？')) return;
  await deleteMember(id);
  renderAdminPage(); loadMemberBar();
};

// ── MODAL ──
window.openModal = function(type, prefill) {
  if (!canEdit() && !['addMember'].includes(type)) return;
  let html = '';
  const todayVal = todayISO;

  if (type==='client') {
    const ec = prefill ? window._state.clients.find(x=>x.id===prefill) : null;
    html=`<div class="modal-title">${ec?'編輯客戶':'新增客戶'}</div>
      <div class="field-group"><div class="field-label">姓名</div><input id="f_name" placeholder="王小明" value="${ec?ec.name:''}"></div>
      <div class="field-group"><div class="field-label">電話</div><input id="f_phone" type="tel" placeholder="0912-345-678" value="${ec?ec.phone||'':''}"></div>
      <div class="field-group"><div class="field-label">職業</div><input id="f_job" placeholder="工程師、老闆..." value="${ec?ec.job||'':''}"></div>
      <div class="field-group"><div class="field-label">溫度</div><select id="f_status"><option value="new" ${ec&&ec.status==='new'?'selected':''}>✨ 新認識</option><option value="hot" ${ec&&ec.status==='hot'?'selected':''}>🔥 熱</option><option value="warm" ${!ec||ec.status==='warm'?'selected':''}>☀️ 溫</option><option value="cold" ${ec&&ec.status==='cold'?'selected':''}>❄️ 冷</option></select></div>
      <div class="field-group"><div class="field-label">下次跟進日期</div><input id="f_followupDate" type="date" value="${ec?ec.followupDate||'':''}"></div>
      <div class="field-group"><div class="field-label">跟進事項</div><textarea id="f_followupNote" rows="2" placeholder="帶建議書、確認意願...">${ec?ec.followupNote||'':''}</textarea></div>
      <div class="field-group"><div class="field-label">跟進狀態</div><select id="f_followupStatus"><option value="pending" ${!ec||ec.followupStatus==='pending'?'selected':''}>⏳ 待跟進</option><option value="done" ${ec&&ec.followupStatus==='done'?'selected':''}>✅ 已跟進</option><option value="deal" ${ec&&ec.followupStatus==='deal'?'selected':''}>🎉 成交</option><option value="hold" ${ec&&ec.followupStatus==='hold'?'selected':''}>⏸ 暫緩</option></select></div>
      <div class="field-group"><div class="field-label">備註</div><textarea id="f_note" rows="2" placeholder="認識的場合...">${ec?ec.note||'':''}</textarea></div>
      <input type="hidden" id="f_clientId" value="${ec?ec.id:''}">
      <div class="modal-btns"><button class="btn-cancel" onclick="closeModal()">取消</button><button class="btn-save" onclick="saveClient()">儲存</button></div>`;
  } else if (type==='brain') {
    html=`<div class="modal-title">腦海名單</div>
      <div class="field-group"><div class="field-label">名字</div><input id="f_name" placeholder="突然想到誰？"></div>
      <div class="field-group"><div class="field-label">關係</div><input id="f_relation" placeholder="同學、鄰居..."></div>
      <div class="field-group"><div class="field-label">備忘</div><textarea id="f_memo" rows="2" placeholder="為什麼想到他？"></textarea></div>
      <div class="modal-btns"><button class="btn-cancel" onclick="closeModal()">取消</button><button class="btn-save" onclick="saveBrain()">記下來</button></div>`;
  } else if (type==='visit') {
    const clientList = window._state.clients||[];
    const matchFound = prefill && clientList.some(c=>c.name===prefill);
    const opts = clientList.map(c=>`<option value="${c.name}" ${c.name===prefill?'selected':''}>${c.name}</option>`).join('');
    const showOther = prefill && !matchFound;
    html=`<div class="modal-title">拜訪記錄</div>
      <div class="field-group"><div class="field-label">客戶</div><select id="f_client">${opts}<option value="__other__" ${showOther?'selected':''}>其他</option></select></div>
      <div class="field-group" id="otherGrp" style="display:${showOther?'block':'none'}"><div class="field-label">姓名</div><input id="f_other" placeholder="客戶名字" value="${showOther?prefill:''}"></div>
      <div class="field-group"><div class="field-label">日期</div><input id="f_date" type="date" value="${todayVal}"></div>
      <div class="field-group"><div class="field-label">聊了什麼</div><textarea id="f_talked" rows="2" placeholder="聊的話題..."></textarea></div>
      <div class="field-group"><div class="field-label">客戶的需求</div><textarea id="f_need" rows="2" placeholder="他最在意什麼？"></textarea></div>
      <div class="field-group"><div class="field-label">客戶的顧慮</div><textarea id="f_concern" rows="2" placeholder="他擔心什麼？"></textarea></div>
      <div class="field-group"><div class="field-label">下次要做什麼</div><textarea id="f_next" rows="2" placeholder="下次帶什麼、說什麼？"></textarea></div>
      <div class="modal-btns"><button class="btn-cancel" onclick="closeModal()">取消</button><button class="btn-save" onclick="saveVisit()">記錄</button></div>`;
  } else if (type==='review') {
    html=`<div class="modal-title">每週復盤</div>
      <div class="field-group"><div class="field-label">這是哪一週？</div><input id="f_week" placeholder="6/9 ~ 6/15"></div>
      <div class="field-group"><div class="field-label">做得好的地方</div><textarea id="f_good" rows="3" placeholder="哪些客戶有進展？"></textarea></div>
      <div class="field-group"><div class="field-label">卡住的地方</div><textarea id="f_stuck" rows="3" placeholder="哪些地方卡住了？"></textarea></div>
      <div class="field-group"><div class="field-label">下週重點</div><textarea id="f_next" rows="3" placeholder="下週要重點跟進誰？"></textarea></div>
      <div class="modal-btns"><button class="btn-cancel" onclick="closeModal()">取消</button><button class="btn-save" onclick="saveReview()">儲存</button></div>`;
  } else if (type==='result') {
    html=`<div class="modal-title">簽單記錄 🎉</div>
      <div class="field-group"><div class="field-label">客戶姓名</div><input id="f_clientName" placeholder="王小明"></div>
      <div class="field-group"><div class="field-label">保費 (NT$)</div><input id="f_premium" type="number" placeholder="50000"></div>
      <div class="field-group"><div class="field-label">保險商品</div><input id="f_product" placeholder="終身壽險、意外險..."></div>
      <div class="field-group"><div class="field-label">日期</div><input id="f_date" type="date" value="${todayVal}"></div>
      <div class="field-group"><div class="field-label">備註</div><textarea id="f_note" rows="2"></textarea></div>
      <div class="modal-btns"><button class="btn-cancel" onclick="closeModal()">取消</button><button class="btn-save" onclick="saveResult()">記錄成果</button></div>`;
  } else if (type==='quote') {
    html=`<div class="modal-title">新增金句</div>
      <div class="field-group"><div class="field-label">金句內容</div><textarea id="f_text" rows="4" placeholder="對你有力量的話..."></textarea></div>
      <div class="field-group"><div class="field-label">來源（選填）</div><input id="f_source" placeholder="聖經、書名..."></div>
      <div class="modal-btns"><button class="btn-cancel" onclick="closeModal()">取消</button><button class="btn-save" onclick="saveQuote()">新增</button></div>`;
  } else if (type==='plan') {
    const pd = window._planDate || todayVal;
    html=`<div class="modal-title">拜訪計畫</div>
      <div class="field-group"><div class="field-label">要拜訪誰</div><input id="f_name" placeholder="張先生"></div>
      <div class="field-group"><div class="field-label">計畫日期</div><input id="f_plandate" type="date" value="${pd}"></div>
      <div class="field-group"><div class="field-label">預計說什麼 / 帶什麼</div><textarea id="f_script" rows="3" placeholder="開場怎麼說、帶哪份資料..."></textarea></div>
      <div class="modal-btns"><button class="btn-cancel" onclick="closeModal()">取消</button><button class="btn-save" onclick="savePlan()">加入計畫</button></div>`;
  } else if (type==='rejection') {
    html=`<div class="modal-title">振作的話</div>
      <div class="field-group"><div class="field-label">被拒後想對自己說的話</div><textarea id="f_text" rows="4"></textarea></div>
      <div class="modal-btns"><button class="btn-cancel" onclick="closeModal()">取消</button><button class="btn-save" onclick="saveRejection()">新增</button></div>`;
  } else if (type==='addMember') {
    html=`<div class="modal-title">新增夥伴帳號</div>
      <div class="field-group"><div class="field-label">姓名（顯示用）</div><input id="f_displayName" placeholder="王小明"></div>
      <div class="field-group"><div class="field-label">帳號（登入用）</div><input id="f_username" placeholder="英文或中文皆可"></div>
      <div class="field-group"><div class="field-label">密碼（建議：姓名+生日）</div><input id="f_password" placeholder="例：王小明19900101"></div>
      <div style="font-size:12px;color:var(--text-dim);margin-bottom:12px;line-height:1.6">密碼設定後請告知夥伴，<br>他們用這組帳密登入夥伴版</div>
      <div class="modal-btns"><button class="btn-cancel" onclick="closeModal()">取消</button><button class="btn-save" onclick="saveMember()">建立帳號</button></div>`;
  }

  showModal(html);
  if (type==='visit') {
    setTimeout(()=>{
      const sel = document.getElementById('f_client');
      if(sel) sel.addEventListener('change',()=>{ document.getElementById('otherGrp').style.display=sel.value==='__other__'?'block':'none'; });
    },100);
  }
};

function showModal(html) { document.getElementById('modalContent').innerHTML=html; document.getElementById('modalOverlay').classList.add('open'); }
window.closeModal = () => document.getElementById('modalOverlay').classList.remove('open');
document.getElementById('modalOverlay').addEventListener('click', e=>{ if(e.target===e.currentTarget) closeModal(); });

// ── SAVE ──
window.saveClient = async function() {
  const name=document.getElementById('f_name').value.trim(); if(!name) return alert('請輸入姓名');
  const cid=document.getElementById('f_clientId')?.value;
  const data={name,phone:document.getElementById('f_phone').value,job:document.getElementById('f_job').value,status:document.getElementById('f_status').value,note:document.getElementById('f_note').value,followupDate:document.getElementById('f_followupDate').value,followupNote:document.getElementById('f_followupNote').value,followupStatus:document.getElementById('f_followupStatus').value};
  if(cid) { await updateItem('clients',cid,data); } else { await addItem('clients',data); }
  closeModal(); window._state.clients=await getItems('clients'); renderClients();
};
window.editFollowup = function(id) { openModal('client', id); };
window.saveBrain = async function() {
  const name=document.getElementById('f_name').value.trim(); if(!name) return;
  await addItem('brain',{name,relation:document.getElementById('f_relation').value,memo:document.getElementById('f_memo').value});
  closeModal(); window._state.brain=await getItems('brain'); renderBrain();
};
window.saveVisit = async function() {
  const sel=document.getElementById('f_client');
  const clientName=sel.value==='__other__'?document.getElementById('f_other').value.trim():sel.value;
  if(!clientName) return alert('請選擇客戶');
  await addItem('visits',{clientName,date:document.getElementById('f_date').value,talked:document.getElementById('f_talked').value,need:document.getElementById('f_need').value,concern:document.getElementById('f_concern').value,next:document.getElementById('f_next').value});
  closeModal(); window._state.visits=await getItems('visits'); renderVisits(); renderGoal(); renderReview();
};
window.saveReview = async function() {
  await addItem('reviews',{week:document.getElementById('f_week').value,good:document.getElementById('f_good').value,stuck:document.getElementById('f_stuck').value,next:document.getElementById('f_next').value});
  closeModal(); window._state.reviews=await getItems('reviews'); renderReview();
};
window.saveResult = async function() {
  const n=document.getElementById('f_clientName').value.trim(); if(!n) return alert('請輸入客戶姓名');
  await addItem('results',{clientName:n,premium:document.getElementById('f_premium').value,product:document.getElementById('f_product').value,date:document.getElementById('f_date').value,note:document.getElementById('f_note').value});
  closeModal(); window._state.results=await getItems('results'); renderResults(); renderReview();
};
window.saveQuote = async function() {
  const t=document.getElementById('f_text').value.trim(); if(!t) return;
  await addItem('quotes',{text:t,source:document.getElementById('f_source').value});
  closeModal(); window._state.quotes=await getItems('quotes'); renderMindset();
};
window.savePlan = async function() {
  const n=document.getElementById('f_name').value.trim(); if(!n) return;
  const pd=document.getElementById('f_plandate')?.value||todayISO;
  await addItem('plans',{name:n,script:document.getElementById('f_script').value,date:pd,done:false});
  closeModal(); window._state.plans=await getItems('plans'); renderMindset();
};
window.saveRejection = async function() {
  const t=document.getElementById('f_text').value.trim(); if(!t) return;
  await addItem('rejections',{text:t});
  closeModal(); window._state.rejections=await getItems('rejections'); renderMindset();
};
window.saveMember = async function() {
  const displayName=document.getElementById('f_displayName').value.trim();
  const username=document.getElementById('f_username').value.trim();
  const password=document.getElementById('f_password').value.trim();
  if(!username||!password) return alert('請填寫帳號和密碼');
  await addMember({displayName,username,password});
  closeModal(); renderAdminPage(); loadMemberBar();
};

window.setPlanDate = function(date) {
  window._planDate = date;
  renderMindset();
};

window.togglePlan = async function(id,done) {
  await updateItem('plans',id,{done});
  window._state.plans=await getItems('plans'); renderMindset();
};
window.quickVisit = function(name) {
  // Switch to visits tab first so the user sees context
  const visitBtn = document.querySelector('.tab-btn[onclick*="visits"]');
  switchTab('visits', visitBtn);
  setTimeout(()=>openModal('visit',name), 150);
};
window.moveToClients = async function(id,name) {
  await addItem('clients',{name,status:'new'});
  await deleteItem('brain',id);
  window._state.clients=await getItems('clients');
  window._state.brain=await getItems('brain');
  renderClients(); renderBrain();
};
window.confirmDelete = async function(col,id) {
  if(!confirm('確定刪除？')) return;
  await deleteItem(col,id);
  window._state[col]=await getItems(col);
  const r={clients:renderClients,brain:renderBrain,visits:()=>{renderVisits();renderGoal();renderReview();},reviews:renderReview,results:()=>{renderResults();renderReview();}};
  if(r[col]) r[col]();
};

// ── TAB ──
window.switchTab = function(tab,btn) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+tab).classList.add('active');
  if(btn) btn.classList.add('active');
  if(tab==='admin') renderAdminPage();
  if(tab==='mindset') renderMindset();
};
</script>
</body>
</html>
